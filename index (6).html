*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,Tahoma,sans-serif;background:#f0f0f0;min-height:100vh;padding:10px 0 40px}
.W{max-width:430px;margin:0 auto;padding:0 14px}
.c{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin-bottom:14px}
.cg{background:#FAEEDA;border:1.5px solid #BA7517;border-radius:14px;padding:18px;margin-bottom:14px}
h1{font-size:22px;font-weight:600}
h2{font-size:16px;font-weight:600;margin-bottom:10px}
.m{color:#6b7280;font-size:13px;line-height:1.7}
.inp{display:block;width:100%;border:1.5px solid #d1d5db;border-radius:10px;padding:13px 14px;font-size:16px;background:#f9fafb;font-family:inherit;outline:none;direction:rtl;text-align:right;-webkit-appearance:none;color:#111}
.inp:focus{border-color:#BA7517}
.inpn{direction:ltr;text-align:center;font-size:26px;letter-spacing:10px;font-family:monospace;padding:14px 10px}
.btn{display:block;width:100%;border-radius:10px;padding:14px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:600;border:1.5px solid #d1d5db;background:#f9fafb;color:#111;margin-bottom:10px;text-align:center;-webkit-appearance:none}
.btn:active{opacity:.6}
.btn:disabled{opacity:.35}
.btg{background:#FAEEDA;color:#412402;border-color:#BA7517}
.btb{background:#eff6ff;color:#1e40af;border-color:#93c5fd}
.btgr{background:#f0fdf4;color:#14532d;border-color:#86efac}
.btr{background:#fef2f2;color:#7f1d1d;border-color:#fca5a5}
.btsm{padding:9px 14px;font-size:13px;width:auto;display:inline-block;margin-bottom:0}
.r2{display:grid;grid-template-columns:1fr 1fr;margin-bottom:14px}.r2 .btn{margin-left:5px;margin-right:5px}.r2 .btn:first-child{margin-left:0}.r2 .btn:last-child{margin-right:0}
.r2 .btn{margin-bottom:0}
.err{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:10px;font-size:14px;text-align:center}
.ok{background:#f0fdf4;color:#14532d;border:1px solid #86efac;border-radius:10px;padding:12px;margin-bottom:10px;font-size:14px;text-align:center}
.pb{background:#e5e7eb;border-radius:6px;height:8px;overflow:hidden;margin-bottom:14px}
.pbf{height:100%;border-radius:6px;transition:width .5s;background:#BA7517}
.dvd{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
.pzt{font-size:15px;line-height:2;white-space:pre-wrap;direction:rtl;text-align:right}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:10px}
.urow{display:flex;align-items:center;padding:10px 0;border-top:1px solid #e5e7eb}
.wb{background:#FAEEDA;border:1.5px solid #BA7517;padding:10px 14px;text-align:center;margin-bottom:14px;font-size:14px;color:#412402;border-radius:10px}
.morse{background:#0d1117;color:#22c55e;font-family:monospace;font-size:22px;letter-spacing:6px;padding:22px 14px;border-radius:10px;text-align:center;user-select:all;-webkit-user-select:all;cursor:text;margin-bottom:0;direction:ltr;word-break:break-all;line-height:1.8}
.coord{background:#0f172a;color:#38bdf8;font-family:monospace;font-size:20px;padding:20px;border-radius:10px;text-align:center;user-select:all;-webkit-user-select:all;cursor:text;margin-bottom:0;direction:ltr;line-height:2}
.chem{background:#f0f9ff;color:#1e40af;font-family:monospace;font-size:28px;padding:24px;border-radius:10px;text-align:center;margin-bottom:0;letter-spacing:1px;border:1px solid #bfdbfe}
.imgpzl{width:100%;border-radius:10px;display:block}
.audiowrap{background:#f1f5f9;border-radius:10px;padding:16px;margin-bottom:0}
.fbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;margin-bottom:14px}

    var e=document.getElementById(id);if(!e)return;
    e.addEventListener("input",function(){
      var v=e.value;
      if(opts&&opts.num)v=v.replace(/\D/g,"").slice(0,4);
      st[key]=v;
      if(opts&&opts.btn){var b=document.getElementById(opts.btn);if(b)b.disabled=(v.length!==4);}
    });
    if(opts&&opts.enter)e.addEventListener("keydown",function(ev){if(ev.key==="Enter")opts.enter();});
  }
  wire("iun","un",{enter:newUser});
  wire("ijn","jn",{enter:joinUser});
  wire("isc","sc",{num:true,enter:startGame});
  wire("ici","ci",{num:true,btn:"bcd",enter:submitCode});
  wire("iapw","apw",{enter:adminLogin});
}

setTimeout(function(){
  var w=LS.g("rh_winner");
  var savedOwn=LS.g("rh_own");
  if(savedOwn){
    var savedUser=LS.g("rh_u_"+savedOwn);
    if(savedUser){
      var bo={user:savedUser,own:savedOwn,pg:savedUser.started?"game":"ready"};
      if(w)bo.winner=w;
      up(bo);return;
    }
  }
  if(w)up({winner:w,pg:"home"});
  else draw();
},80);

</script>
